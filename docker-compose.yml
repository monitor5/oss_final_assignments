# front(Streamlit) 와 back(FastAPI) 을 각각 별도 컨테이너로 실행한다.
# (과제 조건: front 와 back 을 분리된 컨테이너로 구성)
services:
  back:
    build: ./back
    container_name: camera_back
    ports:
      - "8000:8000"   # 호스트 8000 → 컨테이너 8000
    volumes:
      # 호스트 ./back/data 를 컨테이너 /app/data 에 바인드 마운트.
      # storage.json 이 호스트 디스크에 저장되므로 컨테이너 삭제·이미지 재빌드·
      # docker compose down(-v 포함)·서버 재부팅에도 데이터가 보존된다.
      - ./back/data:/app/data
    restart: always

  front:
    build: ./front
    container_name: camera_front
    ports:
      - "8501:8501"   # 호스트 8501 → 컨테이너 8501
    environment:
      # Streamlit 컨테이너가 백엔드를 부를 때 사용하는 주소 (서비스명으로 통신)
      - BACKEND_URL=http://back:8000
    depends_on:
      - back
    restart: always
